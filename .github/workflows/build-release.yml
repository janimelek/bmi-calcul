name: Build and Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # Triggers when you push a tag like 'v1.0'
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub UI

jobs:
  build:
    name: Build APK and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to upload assets to GitHub Releases

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK to Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BMICalculator-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      # This step creates a GitHub Release only if you push a tag (e.g. git tag v1.0 && git push origin v1.0)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
